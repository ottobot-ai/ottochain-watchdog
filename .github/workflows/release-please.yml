name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

      # GITHUB_TOKEN tags don't trigger 'on: push: tags' workflows,
      # but repository_dispatch IS triggered by GITHUB_TOKEN.
      - name: Trigger release workflow
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
          gh api repos/${{ github.repository }}/dispatches --input - <<EOF
          {
            "event_type": "release-created",
            "client_payload": {
              "version": "$VERSION",
              "tag": "v$VERSION"
            }
          }
          EOF
          echo "✅ Dispatched release-created v$VERSION"
